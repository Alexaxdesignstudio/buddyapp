<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy — SaaS för soloföretagare v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1A9E75;--gl:#E6F7F1;--gd:#0F6B50;
  --b:#2563EB;--bl:#EFF6FF;
  --r:#DC2626;--a:#D97706;--p:#7C3AED;--pk:#BE185D;--br:#92400E;
  --s0:#F9FAFB;--s1:#F3F4F6;--s2:#E5E7EB;--s3:#D1D5DB;
  --s4:#9CA3AF;--s5:#6B7280;--s6:#4B5563;--s7:#374151;--s8:#1F2937;--s9:#111827;
  --btn-bg:#111827; /* SVART — alla primärknappar */
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#e5e7eb;}
#app{display:flex;height:100vh;background:var(--s0);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:500;gap:4px;font-family:'Inter',sans-serif;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--btn-bg);color:white;}
.btn-outline{background:transparent;border:1px solid var(--s2);color:var(--s6);}
.btn-outline:hover{background:var(--s1);}
.btn-danger{background:transparent;border:1px solid #FECACA;color:var(--r);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ── LAYOUT ── */
#sbw{width:215px;flex-shrink:0;background:white;border-right:1px solid var(--s1);display:flex;flex-direction:column;height:100vh;}
#sb{flex:1;overflow-y:auto;padding:7px;}
#mwrap{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
#main{flex:1;overflow-y:auto;}

/* ── MODAL ── */
#mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto;}
#mb{background:white;border-radius:14px;border:1px solid var(--s2);padding:1.5rem;width:420px;box-shadow:0 8px 32px rgba(0,0,0,.14);margin-bottom:60px;max-height:82vh;overflow-y:auto;}

/* ── NAV ── */
.ni{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;font-size:12px;cursor:pointer;width:100%;border:none;background:transparent;text-align:left;color:var(--s5);font-family:'Inter',sans-serif;}
.ni:hover{background:var(--s0);}
.ni.act{background:var(--gl);color:var(--gd);font-weight:500;}
.ns{display:flex;align-items:center;gap:6px;padding:4px 8px 4px 27px;border-radius:8px;font-size:11px;cursor:pointer;width:100%;border:none;background:transparent;text-align:left;color:var(--s4);font-family:'Inter',sans-serif;}
.ns:hover{background:var(--s0);}
.ns.act{font-weight:600;}
.nlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--s3);padding:8px 8px 3px;}
.dep-dot{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:white;flex-shrink:0;}

/* ── CARDS ── */
.card{background:white;border:1px solid var(--s2);border-radius:12px;overflow:hidden;}
.kpi{background:white;border:1px solid var(--s2);border-radius:10px;padding:13px 15px;}
.row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--s1);transition:background .1s;}
.row:hover{background:var(--s0);}
.row:last-child{border-bottom:none;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.bdg{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;}
.tgl{width:34px;height:18px;border-radius:9px;position:relative;cursor:pointer;border:none;transition:background .2s;}
.tgl span{position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:2px;box-shadow:0 1px 2px rgba(0,0,0,.15);transition:left .15s;}
.ri{padding:7px 9px;border-radius:7px;border:1px solid var(--s2);background:white;color:var(--s8);width:100%;outline:none;font-family:'Inter',sans-serif;font-size:13px;}
.ri:focus{border-color:var(--g);}
.pb{height:4px;background:var(--s1);border-radius:2px;overflow:hidden;}
.pf{height:4px;border-radius:2px;}
.sc{padding:4px 5px;border-radius:5px;font-size:10px;text-align:center;cursor:pointer;border:1px solid transparent;font-family:'Inter',sans-serif;}
.sc.done{background:#DCFCE7;color:#166534;border-color:#86EFAC;}
.sc.act2{background:#DBEAFE;color:#1E40AF;border-color:#93C5FD;font-weight:600;}
.sc.fut{background:var(--s0);color:var(--s3);}
.sc.fut:hover{background:var(--s1);}

/* ── WEBBLÄNKAR ── */
.wbcat{background:white;border:1px solid var(--s2);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.wbcat-h{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--s1);background:var(--s0);}
.wblink{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--s1);}
.wblink:hover{background:var(--s0);}
.drag-h{cursor:grab;color:var(--s3);font-size:14px;padding:2px;flex-shrink:0;user-select:none;}
.drag-h:hover{color:var(--s6);}
.drag-h:active{cursor:grabbing;}
.wblink.drag-over{border-top:2px solid var(--g);}
.wblink.dragging{opacity:.4;}

/* ── MOBILE ── */
#mob-bar{display:none;background:white;border-bottom:1px solid var(--s1);padding:10px 14px;align-items:center;gap:10px;flex-shrink:0;}
@media(max-width:700px){
  #sbw{position:fixed;top:0;left:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s;}
  #sbw.open{transform:translateX(0);}
  #mob-bar{display:flex!important;}
  #mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40;}
  #mob-ov.show{display:block;}
}

@media print {
  #sbw,#mob-bar,#print-fab,#mw{display:none!important;}
  .btn,.btn-primary,.btn-outline,.btn-danger,button[onclick*="omEdit"],button[onclick*="ark"]{display:none!important;}
  #mwrap{width:100%!important;}
  body,html{background:white!important;}
  .card{box-shadow:none!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  @page{margin:12mm 10mm;size:A4 landscape;}
}

#sb-loading{position:fixed;inset:0;background:white;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#sb-loading .spin{width:36px;height:36px;border:3px solid var(--s1);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#sb-status{position:fixed;bottom:8px;right:12px;font-size:10px;color:var(--s4);z-index:200;display:flex;align-items:center;gap:5px;}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--g);}
.sb-dot.err{background:var(--r);}
.sb-dot.sync{background:var(--a);animation:pulse .8s ease-in-out infinite alternate;}
@keyframes pulse{to{opacity:.3}}

#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0F6B50 0%,#1A9E75 50%,#0F6B50 100%);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;}
#login-box{background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.lb-logo{width:52px;height:52px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 4px 12px rgba(26,158,117,.4);}
.lb-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s;font-family:Inter,sans-serif;border:none;background:transparent;color:var(--s5);}
.lb-tab.act{background:white;color:var(--s9);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.lb-err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 13px;font-size:12px;color:var(--r);margin-bottom:12px;display:none;}
.lb-ok{background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:10px 13px;font-size:12px;color:#065F46;margin-bottom:12px;display:none;}
</style>
</head>
<body>

<div id="sb-loading">
  <div style="width:44px;height:44px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(26,158,117,.35);">
    <span style="color:white;font-weight:800;font-size:20px;">B</span>
  </div>
  <div class="spin"></div>
  <p style="font-size:13px;color:var(--s5);">Ansluter till molnet...</p>
</div>
<div id="sb-status" title="Supabase-anslutning">
  <div class="sb-dot sync" id="sb-dot"></div>
  <span id="sb-txt">Synkar...</span>
</div>

<div id="login-screen">
  <div id="login-box">
    <div class="lb-logo"><span style="color:white;font-weight:800;font-size:22px;">B</span></div>
    <h1 style="text-align:center;font-size:22px;font-weight:800;color:var(--s9);letter-spacing:-.03em;margin-bottom:4px;">Buddy</h1>
    <p style="text-align:center;font-size:12px;color:var(--s4);margin-bottom:24px;">SaaS for soloforetagare</p>
    <div style="display:flex;background:var(--s1);border-radius:10px;padding:3px;margin-bottom:20px;">
      <button class="lb-tab act" id="tab-login" onclick="lbShowTab('login')">Logga in</button>
      <button class="lb-tab" id="tab-signup" onclick="lbShowTab('signup')">Skapa konto</button>
    </div>
    <div id="lb-err" class="lb-err"></div>
    <div id="lb-ok" class="lb-ok"></div>
    <div id="lb-login-form">
      <label style="font-size:11px;font-weight:600;color:var(--s5);display:block;margin-bottom:5px;">E-POSTADRESS</label>
      <input id="lb-email" class="ri" type="email" placeholder="din@epost.se" style="margin-bottom:12px;font-size:14px;padding:11px 13px;">
      <label style="font-size:11px;font-weight:600;color:var(--s5);display:block;margin-bottom:5px;">LOSENORD</label>
      <input id="lb-pass" class="ri" type="password" placeholder="Ditt losenord" style="margin-bottom:20px;font-size:14px;padding:11px 13px;" onkeydown="if(event.key==='Enter')lbLogin()">
      <button onclick="lbLogin()" id="lb-btn" style="width:100%;padding:13px;background:var(--btn-bg);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">Logga in</button>
      <button onclick="lbForgot()" style="width:100%;margin-top:10px;padding:8px;background:transparent;color:var(--s4);border:none;font-size:12px;cursor:pointer;font-family:Inter,sans-serif;">Glomt losenord?</button>
    </div>
    <div id="lb-signup-form" style="display:none;">
      <label style="font-size:11px;font-weight:600;color:var(--s5);display:block;margin-bottom:5px;">E-POSTADRESS</label>
      <input id="lb-email2" class="ri" type="email" placeholder="din@epost.se" style="margin-bottom:12px;font-size:14px;padding:11px 13px;">
      <label style="font-size:11px;font-weight:600;color:var(--s5);display:block;margin-bottom:5px;">LOSENORD (minst 6 tecken)</label>
      <input id="lb-pass2" class="ri" type="password" placeholder="Valj ett losenord" style="margin-bottom:20px;font-size:14px;padding:11px 13px;" onkeydown="if(event.key==='Enter')lbSignup()">
      <button onclick="lbSignup()" style="width:100%;padding:13px;background:var(--btn-bg);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">Skapa konto</button>
    </div>
  </div>
</div>

// -- Status dot ----------------------------------------
function sbStatus(state,msg){
  var dot=document.getElementById('sb-dot');
  var txt=document.getElementById('sb-txt');
  if(!dot||!txt)return;
  if(state==='ok'){dot.style.background='var(--g)';dot.style.animation='none';}
  else if(state==='sync'){dot.style.background='var(--a)';dot.style.animation='';}
  else{dot.style.background='var(--r)';dot.style.animation='none';}
  txt.textContent=msg;
}

// -- Auth headers (with token if available) ------------
function sbHeaders(){
  var token=SB_TOKEN||SB_KEY;
  return{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
}

// -- Login tab switch ----------------------------------
function lbShowTab(tab){
  document.getElementById('tab-login').className='lb-tab'+(tab==='login'?' act':'');
  document.getElementById('tab-signup').className='lb-tab'+(tab==='signup'?' act':'');
  document.getElementById('lb-login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('lb-signup-form').style.display=tab==='signup'?'block':'none';
  document.getElementById('lb-err').style.display='none';
  document.getElementById('lb-ok').style.display='none';
}
function lbShowErr(msg){
  var el=document.getElementById('lb-err');
  el.textContent=msg;el.style.display='block';
  document.getElementById('lb-ok').style.display='none';
}
function lbShowOk(msg){
  var el=document.getElementById('lb-ok');
  el.textContent=msg;el.style.display='block';
  document.getElementById('lb-err').style.display='none';
}
function lbSetLoading(loading){
  var btn=document.getElementById('lb-btn');
  if(btn)btn.textContent=loading?'Loggar in...':'Logga in';
}

// -- Login ---------------------------------------------
function lbLogin(){
  var email=(document.getElementById('lb-email').value||'').trim();
  var pass=document.getElementById('lb-pass').value||'';
  if(!email||!pass){lbShowErr('Fyll i e-post och losenord.');return;}
  lbSetLoading(true);
  fetch(SB_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:pass})
  }).then(function(r){return r.json();}).then(function(data){
    lbSetLoading(false);
    if(data.access_token){
      SB_TOKEN=data.access_token;
      SB_USER=data.user;
      try{localStorage.setItem('sb_token',SB_TOKEN);}catch(e){}
      document.getElementById('login-screen').style.display='none';
      sbBoot();
    } else {
      lbShowErr('Fel e-post eller losenord. Forsok igen.');
    }
  }).catch(function(){lbSetLoading(false);lbShowErr('Anslutningsfel. Kontrollera internet.');});
}

// -- Sign up -------------------------------------------
function lbSignup(){
  var email=(document.getElementById('lb-email2').value||'').trim();
  var pass=document.getElementById('lb-pass2').value||'';
  if(!email||!pass){lbShowErr('Fyll i e-post och losenord.');return;}
  if(pass.length<6){lbShowErr('Losenordet maste vara minst 6 tecken.');return;}
  fetch(SB_URL+'/auth/v1/signup',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:pass})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.id||data.user){
      if(data.access_token){
        SB_TOKEN=data.access_token;
        SB_USER=data.user||data;
        try{localStorage.setItem('sb_token',SB_TOKEN);}catch(e){}
        document.getElementById('login-screen').style.display='none';
        sbBoot();
      } else {
        lbShowOk('Konto skapat! Kolla din e-post och bekrafta, logga sedan in.');
        lbShowTab('login');
      }
    } else {
      lbShowErr(data.msg||data.message||'Nagonting gick fel. Forsok igen.');
    }
  }).catch(function(){lbShowErr('Anslutningsfel.');});
}

// -- Forgot password -----------------------------------
function lbForgot(){
  var email=(document.getElementById('lb-email').value||'').trim();
  if(!email){lbShowErr('Skriv din e-postadress ovan forst.');return;}
  fetch(SB_URL+'/auth/v1/recover',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email})
  }).then(function(){lbShowOk('Aterstallningslank skickad till '+email);}).catch(function(){lbShowErr('Kunde inte skicka mail.');});
}

// -- Logout --------------------------------------------
function lbLogout(){
  if(!confirm('Logga ut?'))return;
  SB_TOKEN=null;SB_USER=null;
  try{localStorage.removeItem('sb_token');}catch(e){}
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('sb-loading').style.display='none';
}

// -- Data helpers --------------------------------------
function sbFetchAll(){
  return fetch(SB_URL+'/rest/v1/buddy_data?select=id,value',{headers:sbHeaders()})
    .then(function(r){return r.json();});
}
function sbUpsert(id,value){
  return fetch(SB_URL+'/rest/v1/buddy_data',{
    method:'POST',
    headers:sbHeaders(),
    body:JSON.stringify({id:id,value:value,updated_at:new Date().toISOString()})
  });
}
function sbFlush(){
  var keys=Object.keys(SB_DIRTY);
  if(!keys.length)return;
  sbStatus('sync','Sparar...');
  var promises=keys.map(function(k){
    return sbUpsert(k,SB_CACHE[k]).then(function(r){
      if(r.ok){delete SB_DIRTY[k];}
    }).catch(function(){});
  });
  Promise.all(promises).then(function(){
    if(Object.keys(SB_DIRTY).length===0)sbStatus('ok','Sparat i molnet');
    else sbStatus('err','Synkfel');
  });
}
function save(key,val){
  SB_CACHE['buddy_'+key]=val;
  SB_DIRTY['buddy_'+key]=true;
  try{localStorage.setItem('buddy_'+key,JSON.stringify(val));}catch(e){}
  if(SB_SYNC_TIMER)clearTimeout(SB_SYNC_TIMER);
  SB_SYNC_TIMER=setTimeout(sbFlush,800);
}
function load(key,def){
  var cached=SB_CACHE['buddy_'+key];
  if(cached!==undefined)return cached;
  try{var v=localStorage.getItem('buddy_'+key);if(v!==null)return JSON.parse(v);}catch(e){}
  return def;
}

// -- Boot ----------------------------------------------
function sbBoot(){
  document.getElementById('sb-loading').style.display='flex';
  sbFetchAll()
  .then(function(rows){
    if(Array.isArray(rows)){
      rows.forEach(function(row){SB_CACHE[row.id]=row.value;});
      SB_ONLINE=true;
      sbStatus('ok','Ansluten');
    } else {
      sbStatus('err','Fel vid laddning');
    }
    document.getElementById('sb-loading').style.display='none';
    render();
  })
  .catch(function(e){
    sbStatus('err','Offline - lokal data');
    document.getElementById('sb-loading').style.display='none';
    render();
  });
}

// -- Auto-login if token saved -------------------------
function sbInit(){
  try{
    var saved=localStorage.getItem('sb_token');
    if(saved){
      SB_TOKEN=saved;
      document.getElementById('login-screen').style.display='none';
      sbBoot();
    } else {
      document.getElementById('sb-loading').style.display='none';
    }
  }catch(e){
    document.getElementById('sb-loading').style.display='none';
  }
}

// Drag-drop webblänkar
function wbDragStart(catId,linkId){wbDragLink=linkId;wbDragCat=catId;}
function wbCatOver(catId){}
function wbLinkOver(el){el.classList.add('drag-over');}
function wbDropOnLink(toCatId,toLinkId){
  document.querySelectorAll('.wblink').forEach(function(el){el.classList.remove('drag-over');});
  if(!wbDragLink||!wbDragCat)return;
  var fromCat=wbcats.find(function(c){return c.id===wbDragCat;});
  var toCat=wbcats.find(function(c){return c.id===toCatId;});
  if(!fromCat||!toCat)return;
  var link=fromCat.l.find(function(l){return l.id===wbDragLink;});
  if(!link)return;
  fromCat.l=fromCat.l.filter(function(l){return l.id!==wbDragLink;});
  var toIdx=toCat.l.findIndex(function(l){return l.id===toLinkId;});
  if(toIdx<0)toCat.l.push(link);else toCat.l.splice(toIdx,0,link);
  save('wbcats',wbcats);wbDragLink=null;wbDragCat=null;rMain();
}
function wbDrop(toCatId){
  if(!wbDragLink||!wbDragCat)return;
  var fromCat=wbcats.find(function(c){return c.id===wbDragCat;});
  var toCat=wbcats.find(function(c){return c.id===toCatId;});
  if(!fromCat||!toCat)return;
  var link=fromCat.l.find(function(l){return l.id===wbDragLink;});
  if(!link)return;
  fromCat.l=fromCat.l.filter(function(l){return l.id!==wbDragLink;});
  toCat.l.push(link);
  save('wbcats',wbcats);wbDragLink=null;wbDragCat=null;rMain();
}

  // ── ROW FACTORY ───────────────────────────────────────────────────
  function mkRow(label,sub,color,sdStr,edStr,pct,badge,clickFn,rowIdx){
    var sd=sdStr?new Date(sdStr):null;
    var ed=edStr?new Date(edStr):null;
    var bsDay=0,bwDay=0;
    if(sd&&ed){
      var bsD=Math.round((sd.getTime()-startD.getTime())/864e5);
      var beD=Math.round((ed.getTime()-startD.getTime())/864e5);
      var vis0=Math.max(0,bsD);
      var vis1=Math.min(days,beD);
      bsDay=bsD;
      bwDay=Math.max(0,vis1-vis0);
      bsDay=vis0; // start of visible portion
    }
    var bsPx=bsDay*colW;
    var bwPx=bwDay*colW;
    var bg=rowIdx%2===0?'white':'#FAFAF9';
    var r='<div style="display:flex;min-height:40px;background:'+bg+';border-bottom:1px solid var(--s1);" ';
    if(clickFn)r+='onmouseover="this.querySelector(\'.gantt-name\').style.color=\'var(--b)\'" onmouseout="this.querySelector(\'.gantt-name\').style.color=\''+(clickFn?'var(--b)':'var(--s8)')+'\'"';
    r+='>';
    // Name col
    r+='<div style="width:'+LKOL+'px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 10px;border-right:1px solid var(--s1);cursor:'+(clickFn?'pointer':'default')+'" '+(clickFn?'onclick="'+clickFn+'"':'')+' >';
    r+='<div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0;box-shadow:0 0 0 2px '+color+'33;"></div>';
    r+='<div style="min-width:0;"><p class="gantt-name" style="font-size:12px;font-weight:600;color:'+(clickFn?'var(--b)':'var(--s8)')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+label+'</p>';
    if(sub)r+='<p style="font-size:10px;color:var(--s4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+sub+'</p>';
    r+='</div></div>';
    // Klar col
    r+='<div style="width:'+INFO_W+'px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;border-right:1px solid var(--s1);">';
    if(pct>0){
      r+='<div style="width:32px;"><div style="height:3px;background:var(--s1);border-radius:99px;margin-bottom:2px;"><div style="height:3px;width:'+Math.min(100,pct)+'%;background:'+color+';border-radius:99px;"></div></div>';
      r+='<span style="font-size:9px;color:var(--s5);">'+Math.round(pct)+'%</span></div>';
    }
    if(badge)r+='<span style="font-size:9px;color:var(--s4);">'+badge+'</span>';
    r+='</div>';
    // Timeline
    r+='<div style="width:'+totalW+'px;flex-shrink:0;position:relative;min-height:40px;">';
    // weekend bg
    dates.forEach(function(d,di){
      if(d.getDay()===0||d.getDay()===6)
        r+='<div style="position:absolute;left:'+(di*colW)+'px;top:0;width:'+colW+'px;height:100%;background:rgba(0,0,0,.018);pointer-events:none;"></div>';
    });
    // grid lines
    dates.forEach(function(d,di){
      r+='<div style="position:absolute;left:'+(di*colW)+'px;top:0;width:1px;height:100%;background:'+(d.getDay()===1?'rgba(0,0,0,.07)':'rgba(0,0,0,.025)')+';"></div>';
    });
    // today line
    if(todayPx>=0&&todayPx<=totalW)
      r+='<div style="position:absolute;left:'+todayPx+'px;top:0;width:2px;height:100%;background:#1A9E75;opacity:.6;z-index:3;"></div>';
    // bar
    if(bwPx>0){
      r+='<div '+(clickFn?'onclick="'+clickFn+'"':'')+' style="position:absolute;left:'+bsPx+'px;width:'+bwPx+'px;height:18px;top:11px;border-radius:4px;background:'+color+';z-index:2;cursor:'+(clickFn?'pointer':'default')+';overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.2);">';
      // progress overlay
      if(pct>0)r+='<div style="position:absolute;left:0;top:0;width:'+Math.min(100,pct)+'%;height:100%;background:rgba(255,255,255,.25);border-radius:4px 0 0 4px;"></div>';
      // label on bar
      if(bwPx>60)r+='<span style="position:absolute;left:7px;top:2px;font-size:9px;font-weight:600;color:rgba(255,255,255,.95);white-space:nowrap;overflow:hidden;max-width:'+(bwPx-14)+'px;display:block;">'+label+'</span>';
      r+='</div>';
    }
    r+='</div></div>';
    return r;
  }

  // ── GROUP HEADER ─────────────────────────────────────────────────
  function groupHdr(label,count,color){
    var r='<div style="display:flex;background:'+color+';position:sticky;top:44px;z-index:8;">';
    r+='<div style="width:'+(LKOL+INFO_W)+'px;flex-shrink:0;padding:5px 10px;display:flex;align-items:center;gap:7px;">';
    r+='<span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em;">'+label+'</span>';
    if(count!==undefined)r+='<span style="background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:9px;padding:1px 7px;border-radius:99px;">'+count+'</span>';
    r+='</div><div style="width:'+totalW+'px;flex-shrink:0;"></div></div>';
    return r;
  }

  // ── RENDER ROWS ──────────────────────────────────────────────────
  h+='<div>';
  var akt=kunder.filter(function(k){return !k.ark;});
  h+=groupHdr('Kunder &amp; Uppdrag',akt.length,'#1F2937');
  akt.forEach(function(k,idx){
    var pct=k.tasks.length>0?Math.round(k.tasks.filter(function(t){return t.done;}).length/k.tasks.length*100):0;
    var sd=k.startDat||new Date(TODAY.getTime()-14*864e5).toISOString().slice(0,10);
    var ed=k.slutDat||new Date(TODAY.getTime()+45*864e5).toISOString().slice(0,10);
    var totH=k.timlogs?k.timlogs.reduce(function(s,l){return s+l.h+(l.m||0)/60;},0):0;
    var badge=totH>0?(Math.round(totH*10)/10)+'h':'';
    h+=mkRow(k.n,k.t,AVC[k.ci%7],sd,ed,pct,badge,'openKund('+k.id+')',idx);
  });

  var hasLed=ledigtRows&&ledigtRows.some(function(l){return l.start&&l.end;});
  if(hasLed){
    h+=groupHdr('Ledigt &amp; Semester',undefined,'#374151');
    ledigtRows.forEach(function(lv,idx){
      if(!lv.start||!lv.end)return;
      h+=mkRow(lv.label,'',lv.color||'#D97706',lv.start,lv.end,0,'','',idx);
    });
  }
  h+='<div style="padding:8px 10px;">';
  h+='<button onclick="omNyLedigt()" class="btn btn-outline btn-sm">+ Lagg till ledigt / semester</button>';
  h+='</div>';
  h+='</div></div></div>';
  return h;
}

function txCopyEl(tid,type){
  var elId=type===0?'txr'+tid:'txb'+tid;
  var el=document.getElementById(elId);
  if(!el)return;
  var txt=el.innerText||el.textContent||'';
  function flash(btn){var o=btn.textContent;btn.textContent='Kopierad!';btn.style.background='var(--gl)';btn.style.color='var(--gd)';btn.style.borderColor='var(--g)';setTimeout(function(){btn.textContent=o;btn.style.background='';btn.style.color='';btn.style.borderColor='';},1500);}
  var btns=document.querySelectorAll('button');
  var cb=null;
  btns.forEach(function(b){if(b.getAttribute('onclick')==='txCopyEl('+tid+','+type+')')cb=b;});
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){if(cb)flash(cb);}).catch(function(){txFallback(el,cb,flash);});}
  else{txFallback(el,cb,flash);}
}
function txFallback(el,btn,flash){
  var r=document.createRange();r.selectNodeContents(el);
  var s=window.getSelection();s.removeAllRanges();s.addRange(r);
  try{document.execCommand('copy');if(btn)flash(btn);}catch(e){}
  s.removeAllRanges();
}

function crmTillKund(id){
  var lead=crmLeads.find(function(x){return x.id===id;});

  var nk={

    ci:kunder.length%7,
    ark:false,

    timMin:0,timMax:0,

    notes:(lead.logs&&lead.logs.length?lead.logs.map(function(l){return l.ts+': '+l.text;}).join('\n'):''),
    timlogs:[],
    startDat:new Date().toISOString().slice(0,10),
    slutDat:new Date(new Date().getTime()+60*864e5).toISOString().slice(0,10),
    // Keep CRM info
    crmMail:lead.mail||'',
    crmTel:lead.tel||'',
    crmWebb:lead.webb||''
  };
  kunder.push(nk);

  lead.logs=lead.logs||[];
  lead.logs.unshift({ts:crmNowTs(),text:'Konverterad till aktiv kund i systemet.'});

}

function bwImportCSV(){
  var inp=document.getElementById('bw-csv-inp');
  if(!inp||!inp.files||!inp.files[0])return;
  var file=inp.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var lines=text.split('\n');
    if(!lines.length)return;
    // Parse header
    var headers=lines[0].replace(/^\uFEFF/,'').split(',').map(function(h){return h.replace(/^"|"$/g,'').trim();});
    var domIdx=headers.indexOf('Root Domain');
    var coIdx=headers.indexOf('Company');
    var emIdx=headers.indexOf('Emails');
    var telIdx=headers.indexOf('Telephones');
    var cityIdx=headers.indexOf('City');
    var vertIdx=headers.indexOf('Vertical');
    var fbIdx=headers.indexOf('Facebook');
    var liIdx=headers.indexOf('LinkedIn');
    var revIdx=headers.indexOf('Sales Revenue');
    var imported=0;
    var skipped=0;
    var existingDomains={};
    bwLeads.forEach(function(l){existingDomains[l.domain]=true;});
    for(var i=1;i<lines.length;i++){
      var line=lines[i].trim();
      if(!line)continue;
      // Simple CSV parse (handles quoted fields)
      var cols=[];
      var inQ=false;var cur='';
      for(var j=0;j<line.length;j++){
        var ch=line[j];
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
        else cur+=ch;
      }
      cols.push(cur.trim());
      var domain=cols[domIdx]||'';
      if(!domain)continue;
      if(existingDomains[domain]){skipped++;continue;}
      var vertical=(cols[vertIdx]||'').replace(/"/g,'');
      var company=(cols[coIdx]||'').replace(/"/g,'');
      var email=(cols[emIdx]||'').replace(/"/g,'');
      var tel=(cols[telIdx]||'').replace(/"/g,'');
      var city=(cols[cityIdx]||'').replace(/"/g,'');
      var fb=(cols[fbIdx]||'').replace(/"/g,'');
      var li=(cols[liIdx]||'').replace(/"/g,'');
      var rev=(cols[revIdx]||'').replace(/"/g,'');
      bwLeads.push({
        id:newId(),
        domain:domain,
        company:company||domain,
        email:email,
        tel:tel,
        city:city,
        vertical:vertical==='Unknown'?'':vertical,
        facebook:fb,
        linkedin:li,
        revenue:rev,
        status:'Ej kontaktad',
        anteckning:'',
        uppfdat:'',
        importerad:new Date().toISOString().slice(0,10)
      });
      existingDomains[domain]=true;
      imported++;
    }
    bwSave();
    document.getElementById('bw-import-result').textContent=imported+' leads importerade, '+skipped+' redan fanns.';
    document.getElementById('bw-import-result').style.color=imported>0?'var(--g)':'var(--a)';
    setTimeout(function(){cm();rMain();},1200);
  };
  reader.readAsText(file,'utf-8');
}

  h+='</div>';
  return h;

function bwTillCRM(id){
  var l=bwLeads.find(function(x){return x.id===id;});
  if(!l)return;
  var nyId=newId();
  crmLeads.unshift({
    id:nyId,
    foretag:l.company||l.domain,
    kontakt:'',
    mail:l.email||'',
    tel:l.tel||'',
    webb:l.domain,
    paket:CRM_PAKET[0],
    fas:'Lead',
    uppfdat:l.uppfdat||'',
    skapad:new Date().toISOString().slice(0,10),
    logs:l.logs&&l.logs.length?[{ts:crmNowTs(),text:'Importerad fran BuiltWith-leads. '+l.domain}]:[]
  });
  crmSave();
  l.status='Kontaktad';
  bwSave();
  alert(l.domain+' har lagts till i CRM under Lead-fasen!');
  bwDetailId=null;
  P='ma_crm';
  save('page',P);
  render();
}


function crmFmtTs(ts){return ts||'';}
function crmNowTs(){var d=new Date();var pad=function(n){return n<10?'0'+n:n;};return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
function crmSave(){save('crmLeads',crmLeads);}

function crmDelLead(id){
  if(!confirm('Ta bort kontakten?'))return;
  crmLeads=crmLeads.filter(function(x){return x.id!==id;});
  crmSave();crmOpen=null;rMain();
}
function crmLogNote(id){
  var el=document.getElementById('crm-note-inp');
  if(!el)return;
  var txt=(el.value||'').trim();
  if(!txt){alert('Skriv en anteckning forst.');return;}
  var lead=crmLeads.find(function(x){return x.id===id;});
  if(!lead)return;
  if(!lead.logs)lead.logs=[];
  lead.logs.unshift({ts:crmNowTs(),text:txt});
  crmSave();
  el.value='';
  crmOpen=id;
  rMain();
}
function crmSetFas(id,fas){
  var lead=crmLeads.find(function(x){return x.id===id;});
  if(!lead)return;
  lead.fas=fas;
  crmSave();
  crmOpen=id;
  rMain();
}
function crmSetPaket(id,p){
  var lead=crmLeads.find(function(x){return x.id===id;});
  if(!lead)return;
  lead.paket=p;
  crmSave();
}
function crmSetUppf(id,d){
  var lead=crmLeads.find(function(x){return x.id===id;});
  if(!lead)return;
  lead.uppfdat=d;
  crmSave();
}
function crmSaveField(id,field){
  var el=document.getElementById('crm-'+field+'-'+id);
  if(!el)return;

function pgCRM(){
  if(crmOpen){return pgCRMDetail(crmOpen);}
  var todayS=dS(TODAY);
  var filtered=crmLeads.filter(function(l){
    var matchF=!crmFasFilter||l.fas===crmFasFilter;
    var matchS=!crmFilter||l.foretag.toLowerCase().indexOf(crmFilter.toLowerCase())>=0||l.kontakt.toLowerCase().indexOf(crmFilter.toLowerCase())>=0;
    return matchF&&matchS;
  });

  // Stats
  var total=crmLeads.length;
  var uppfIdag=crmLeads.filter(function(l){return l.uppfdat===todayS;}).length;
  var uppfForsenad=crmLeads.filter(function(l){return l.uppfdat&&l.uppfdat<todayS;}).length;
  var vunna=crmLeads.filter(function(l){return l.fas==='Vunnen';}).length;

  var h='<div style="background:white;border-bottom:1px solid var(--s1);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">';
  h+='<div><p style="font-size:9px;color:#B45309;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;font-weight:600;">Marknad &middot; CRM</p>';
  h+='<h2 style="font-size:15px;font-weight:700;color:var(--s9);">CRM</h2></div>';
  h+='<button class="btn btn-primary btn-sm" onclick="omNyCRMLead()">+ Ny kontakt</button></div>';

  // KPI row
  h+='<div style="padding:12px 14px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">';
  [{l:'Totalt',v:total,c:'var(--s8)'},{l:'Uppfoljning idag',v:uppfIdag,c:'var(--a)'},{l:'Forsenade',v:uppfForsenad,c:'var(--r)'},{l:'Vunna',v:vunna,c:'var(--g)'}].forEach(function(k){
    h+='<div class="kpi"><p style="font-size:9px;color:var(--s4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;">'+k.l+'</p>';
    h+='<p style="font-size:22px;font-weight:700;color:'+k.c+';letter-spacing:-.03em;">'+k.v+'</p></div>';
  });
  h+='</div>';

  // Filter bar
  h+='<div style="padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
  h+='<input class="ri" placeholder="Sok foretag eller kontakt..." value="'+crmFilter+'" oninput="crmFilter=this.value;rMain()" style="flex:1;min-width:160px;font-size:12px;padding:6px 10px;">';
  h+='<select class="ri" style="font-size:11px;padding:5px 8px;width:auto;" onchange="crmFasFilter=this.value;rMain()">';
  h+='<option value="">Alla faser</option>';
  CRM_FASER.forEach(function(f){h+='<option '+(crmFasFilter===f?'selected':'')+'>'+f+'</option>';});
  h+='</select></div>';

  // Pipeline view - columns by phase
  h+='<div style="padding:0 14px 14px;overflow-x:auto;">';
  h+='<div style="display:flex;gap:9px;min-width:800px;align-items:flex-start;">';
  var visibleFaser=crmFasFilter?[crmFasFilter]:CRM_FASER;
  visibleFaser.forEach(function(fas){
    var items=filtered.filter(function(l){return l.fas===fas;});
    var col=CRM_FARG[fas]||'#6B7280';
    h+='<div style="flex:1;min-width:155px;background:var(--s1);border-radius:12px;border-top:3px solid '+col+';" ondragover="crmDragOver(event)" data-fas="'+fas+'" ondrop="crmDropByEl(event,this)">';
    h+='<div style="padding:8px 10px;display:flex;align-items:center;gap:6px;">';
    h+='<span style="font-size:12px;font-weight:600;color:var(--s8);">'+fas+'</span>';
    h+='<span style="font-size:10px;background:white;border-radius:99px;padding:1px 6px;color:var(--s5);">'+items.length+'</span></div>';
    h+='<div style="padding:0 7px 8px;">';
    items.forEach(function(l){
      var hasUppf=l.uppfdat&&l.uppfdat!=='';
      var isPast=hasUppf&&l.uppfdat<todayS;
      var isToday=hasUppf&&l.uppfdat===todayS;
      var lastLog=l.logs&&l.logs.length?l.logs[0]:null;
      h+='<div onclick="crmOpen='+l.id+';rMain()" style="background:white;border:1px solid var(--s2);border-radius:9px;padding:9px 10px;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s;" onmouseover="this.style.boxShadow=\'0 2px 8px rgba(0,0,0,.09)\'" onmouseout="this.style.boxShadow=\'none\'">';
      h+='<p style="font-size:12px;font-weight:600;color:var(--s8);margin-bottom:2px;line-height:1.3;">'+l.foretag+'</p>';
      if(l.kontakt)h+='<p style="font-size:10px;color:var(--s5);margin-bottom:4px;">'+l.kontakt+'</p>';
      if(l.webb)h+='<p style="font-size:10px;color:var(--b);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+l.webb+'</p>';
      if(l.paket)h+='<span class="bdg" style="background:var(--s1);color:var(--s5);font-size:9px;margin-bottom:4px;display:inline-flex;">'+l.paket+'</span>';
      if(hasUppf){
        h+='<div style="display:flex;align-items:center;gap:3px;margin-top:4px;">';
        h+='<span style="font-size:9px;padding:2px 6px;border-radius:99px;background:'+(isPast?'#FEF2F2':isToday?'#FEF3C7':'#F3F4F6')+';color:'+(isPast?'var(--r)':isToday?'var(--a)':'var(--s5)')+';font-weight:600;">&#128197; '+l.uppfdat+'</span>';
        h+='</div>';
      }
      if(lastLog){
        h+='<p style="font-size:10px;color:var(--s4);margin-top:4px;border-top:1px solid var(--s1);padding-top:4px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">'+lastLog.text+'</p>';
      }
      h+='</div>';
    });
    h+='<button onclick="crmFasFilter=\''+fas+'\';omNyCRMLead()" style="width:100%;border:1px dashed var(--s2);background:transparent;border-radius:8px;padding:6px;font-size:11px;cursor:pointer;color:var(--s5);font-family:Inter,sans-serif;">+</button>';
    h+='</div></div>';
  });
  h+='</div></div>';

  // Uppföljningskalender - kommande 7 dagar
  var kommande=crmLeads.filter(function(l){return l.uppfdat>=todayS;}).sort(function(a,b){return a.uppfdat.localeCompare(b.uppfdat);}).slice(0,8);
  if(kommande.length){
    h+='<div style="padding:0 14px 14px;">';
    h+='<p style="font-size:11px;font-weight:600;color:var(--s7);margin-bottom:8px;">&#128197; Uppfoljningskalender</p>';
    h+='<div style="display:flex;flex-direction:column;gap:4px;">';
    kommande.forEach(function(l){
      var isToday=l.uppfdat===todayS;

      h+='<span style="font-size:11px;font-weight:700;color:'+(isToday?'var(--a)':'var(--s6)')+';width:85px;flex-shrink:0;">'+l.uppfdat+'</span>';
      h+='<span style="font-size:12px;font-weight:500;color:var(--s8);flex:1;">'+l.foretag+'</span>';
      h+='<span class="bdg" style="background:'+CRM_FARG[l.fas]+';color:white;font-size:10px;">'+l.fas+'</span>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  return h;
}

function pgCRMDetail(id){
  var lead=crmLeads.find(function(x){return x.id===id;});
  if(!lead){crmOpen=null;return pgCRM();}
  var todayS=dS(TODAY);
  var hasUppf=lead.uppfdat&&lead.uppfdat!=='';
  var isPast=hasUppf&&lead.uppfdat<todayS;
  var isToday=hasUppf&&lead.uppfdat===todayS;
  var fasColor=CRM_FARG[lead.fas]||'#6B7280';

  var h='<div style="background:white;border-bottom:1px solid var(--s1);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  h+='<button onclick="crmOpen=null;rMain()" class="btn btn-outline btn-sm">&larr; CRM</button>';
  h+='<div style="flex:1;">';
  h+='<p style="font-size:16px;font-weight:700;color:var(--s9);">'+lead.foretag+'</p>';
  if(lead.kontakt)h+='<p style="font-size:11px;color:var(--s5);">'+lead.kontakt+'</p>';

// === TIDRÄKNARE ===
var tidState={fran:'08:00',till:'17:00',rast:60,avrundning:15,kundId:0};

function tidCalc(){
  var f=tidState.fran.split(':').map(Number);
  var t=tidState.till.split(':').map(Number);
  var totMin=(t[0]*60+t[1])-(f[0]*60+f[1])-tidState.rast;
  if(totMin<0)totMin+=24*60;
  var totH=totMin/60;
  var avr=tidState.avrundning;
  var avradH=avr>0?Math.round(totH/(avr/60))*(avr/60):totH;
  return{totMin:totMin,totH:totH,avradH:avradH};
}

function tidUpdatePreview(){
  var c=tidCalc();
  var el=document.getElementById('tid-preview');
  if(!el)return;
  var k=kunder.find(function(x){return x.id===parseInt(tidState.kundId||0);});
  var tx=k?k.tx:0;
  var bel=Math.round(c.avradH*tx);
  el.innerHTML='<b>Faktisk tid:</b> '+Math.floor(c.totH)+'h '+(Math.round((c.totH%1)*60))+'m &rarr; <b>Avrundat ('+tidState.avrundning+' min):</b> <span style="color:var(--g);font-weight:700;">'+c.avradH.toFixed(2)+'h</span>'+(tx?' &nbsp;<span style="color:var(--b);font-weight:700;">'+bel.toLocaleString('sv-SE')+' kr</span>':'');
}

function tidSpara(){
  var k=kunder.find(function(x){return x.id===parseInt(tidState.kundId||0);});
  if(!k){alert('Valj en kund.');return;}
  var c=tidCalc();
  if(c.totH<=0){alert('Kontrollera tiderna.');return;}
  var not=(document.getElementById('tid-not').value||'').trim();
  var dat=(document.getElementById('tid-dat').value)||dS(TODAY);
  if(!k.timlogs)k.timlogs=[];
  var h=Math.floor(c.avradH);var m=Math.round((c.avradH-h)*60);
  var belopp=Math.round(c.avradH*k.tx);
  k.timlogs.push({id:newId(),h:h,m:m,datum:dat,not:not,belopp:belopp});
  save('kunder',kunder);
  alert('Tidlogg sparad: '+h+'h '+m+'m -> '+belopp.toLocaleString('sv-SE')+' kr');
  tidState={fran:'08:00',till:'17:00',rast:60,avrundning:15,kundId:0};
  rMain();
}

  var c=tidCalc();
  var k=kunder.find(function(x){return x.id===parseInt(tidState.kundId||0);});
  var tx=k?k.tx:720;
  var bel=Math.round(c.avradH*tx);
  var h=phdr('Tidraknare','Tidraknare','','');

  h+='<div>'+lbl('AVRUNDNING')+'<select id="tid-avr" class="ri" style="font-size:15px;padding:12px;" onchange="tidState.avrundning=parseInt(this.value);tidUpdatePreview()">';
  [{v:0,l:'Ingen'},{v:5,l:'5 min = 0,08h'},{v:15,l:'15 min = 0,25h'},{v:30,l:'30 min = 0,5h'},{v:60,l:'60 min = 1h'}].forEach(function(o){

  });
  h+='</select></div>';
  h+='</div>';

  // Preview
  h+='<div id="tid-preview" style="background:var(--s0);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--s8);line-height:1.6;">';
  h+='<b>Faktisk tid:</b> '+Math.floor(c.totH)+'h '+(Math.round((c.totH%1)*60))+'m &rarr; <b>Avrundat:</b> <span style="color:var(--g);font-weight:700;">'+c.avradH.toFixed(2)+'h</span>'+(tx?' &nbsp;<span style="color:var(--b);font-weight:700;">'+bel.toLocaleString('sv-SE')+' kr</span>':'');
  h+='</div></div>';

  // Bottom row
  h+='<div class="card" style="padding:16px 20px;">';
  h+='<div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:end;">';

  h+='<div>'+lbl('KUND')+'<select id="tid-kund" class="ri" style="min-width:160px;font-size:13px;padding:10px;" onchange="tidState.kundId=this.value;tidUpdatePreview()">';
  h+='<option value="0">Valj kund...</option>';
  kunder.filter(function(k2){return !k2.ark;}).forEach(function(k2){
    h+='<option value="'+k2.id+'"'+(tidState.kundId==k2.id?' selected':'')+'>'+k2.n+'</option>';
  });
  h+='</select></div>';

  h+='<div>'+lbl('NOTERING')+'<input id="tid-not" class="ri" placeholder="Vad jobbade du med?" style="padding:10px;font-size:13px;"></div>';

  h+='<div>'+lbl('DATUM')+'<input id="tid-dat" class="ri" type="date" value="'+dS(TODAY)+'" style="padding:10px;font-size:13px;"></div>';

  h+='<div style="align-self:end;"><button onclick="tidSpara()" class="btn btn-primary" style="padding:10px 20px;font-size:14px;font-weight:700;border-radius:8px;">Spara tidlogg</button></div>';
  h+='</div></div>';

  // Recent logs across all customers
  var allLogs=[];
  kunder.forEach(function(k2){
    if(k2.timlogs)k2.timlogs.forEach(function(l){allLogs.push(Object.assign({},l,{kundNamn:k2.n,taxa:k2.tx}));});
  });
  allLogs.sort(function(a,b){return b.datum.localeCompare(a.datum);});
  if(allLogs.length){
    h+='<div class="card" style="margin-top:12px;"><div style="padding:9px 14px;border-bottom:1px solid var(--s1);display:flex;justify-content:space-between;">';
    h+='<p style="font-size:12px;font-weight:600;color:var(--s8);">Senaste tidloggar</p>';
    var totKr=allLogs.reduce(function(s,l){return s+(l.belopp||0);},0);
    h+='<span style="font-size:12px;font-weight:700;color:var(--g);">'+kr(totKr)+' totalt</span></div>';
    allLogs.slice(0,10).forEach(function(l){
      h+='<div class="row"><div style="flex:1;"><p style="font-size:12px;font-weight:600;color:var(--s8);">'+l.h+'t '+(l.m||0)+'m'+(l.not?' &mdash; '+l.not:'')+'</p>';
      h+='<p style="font-size:10px;color:var(--s4);">'+l.kundNamn+' &middot; '+l.datum+'</p></div>';
      h+='<span style="font-size:12px;font-weight:700;color:var(--g);">'+kr(l.belopp||0)+'</span></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}
